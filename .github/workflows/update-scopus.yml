name: Update Scopus cache

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"

      - name: Update cache
        env:
         SCOPUS_KEY: ${{ secrets.SCOPUS_KEY }}
        run: php scopus.php

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add scopus_cache.html

          git diff --cached --quiet || git commit -m "Update Scopus cache"

          git push
